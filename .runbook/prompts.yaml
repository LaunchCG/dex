version: "1.0"

prompts:
  ci:
    description: "Run the full CI pipeline (lint → test → build) and fix failures"
    content: |
      Run the CI pipeline for this Go project in order:
      1. {{run_task "lint"}} — fix any formatting or vet issues first
      2. {{run_task "test"}} — fix any failing tests
      3. {{run_task "build"}} — confirm the binary compiles
      Do not proceed to the next step until the current one passes.

  fix-test-failures:
    description: "Run tests and fix any failures"
    content: |
      Run {{run_task "test"}} and analyze the output.
      For each failing test, identify the root cause and fix it.
      Re-run to confirm all tests pass before finishing.
